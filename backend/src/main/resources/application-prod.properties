# ── Production profile ────────────────────────────────────────────
# All values read from environment variables — never hardcode secrets

# MongoDB Atlas
spring.data.mongodb.uri=${MONGODB_URI}

# JWT — must be 32+ chars, set in Render/Railway dashboard
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS — your Vercel frontend URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://crowdshield.vercel.app}

# Twilio (optional)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# Logging
logging.level.root=WARN
logging.level.com.crowdshield=INFO
